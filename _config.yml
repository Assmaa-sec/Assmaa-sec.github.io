# Build settings — no gem theme; fully custom layouts
plugins:
  - jekyll-feed

# Jekyll collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  ctf_writeups:
    output: true
    permalink: /ctf-writeups/:name/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "ctf_writeups"
    values:
      layout: "writeup"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .sass-cache/
