<footer class="site-footer">
  <div class="footer-inner">

    <p class="footer-copy">
      &copy; {{ 'now' | date: "%Y" }} <span>{{ site.title }}</span> &mdash; Cybersecurity Engineer &amp; AI Security Researcher
    </p>

    <ul class="footer-links">
      {% if site.github_username and site.github_username != "" %}
      <li><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">GitHub</a></li>
      {% endif %}
      {% if site.linkedin_username and site.linkedin_username != "" %}
      <li><a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
      {% endif %}
      <li><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
    </ul>

  </div>
</footer>
